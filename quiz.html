<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragrance Finder Quiz</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #000; }
    .quiz-container { max-width: 600px; margin: 4rem auto; background: #181818; border-radius: 16px; box-shadow: 0 4px 32px rgba(0,0,0,0.25); padding: 2.5rem 2rem; }
    .quiz-title { color: #ffd105; text-align: center; margin-bottom: 2rem; }
    .quiz-question { color: #ffd105; font-size: 1.2rem; margin-bottom: 1.5rem; text-align: center; }
    .quiz-options { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
    .quiz-option { background: #222; color: #ffd105; border: none; border-radius: 8px; padding: 1rem 2rem; font-size: 1.1rem; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .quiz-option:hover { background: #ffd105; color: #181818; }
    .quiz-result { color: #fff; font-size: 1.2rem; text-align: center; margin-top: 2rem; }
    .quiz-loader { color: #ffd105; text-align: center; margin: 2rem 0; }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1 class="quiz-title">Fragrance Finder Quiz</h1>
    <div id="quiz-content"></div>
  </div>
  <script src="quiz-ai.js"></script>
</body>
</html>
